services:

  netnotify-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netnotify-server
    depends_on:
      netnotify-flyway:
        condition: service_completed_successfully
      netnotify-rabbitmq:
        condition: service_healthy
      netnotify-postgres:
        condition: service_healthy
      netnotify-dragonfly:
        condition: service_healthy
    ports:
      - "8080:${PORT}"
    environment:
      KEYCLOAK_AUTH_SERVER_URL: ${KEYCLOAK_AUTH_SERVER_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_TOKEN_URL: ${KEYCLOAK_TOKEN_URL}
      KEYCLOAK_PROVIDER_ISSUER: ${KEYCLOAK_PROVIDER_ISSUER}

      PORT: ${PORT}
      POSTGRES_HOST: netnotify-postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER} 
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      SPRING_PROFILES_ACTIVE: prod
      RABBITMQ_HOST: netnotify-rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
      RABBITMQ_ROUTING_KEY: ${RABBITMQ_ROUTING_KEY}
      RABBITMQ_EXCHANGE_DURABLE: ${RABBITMQ_EXCHANGE_DURABLE}
      RABBITMQ_ADMIN_PRODUCER_USER: ${RABBITMQ_ADMIN_PRODUCER_USER:-admin-producer}
      RABBITMQ_ADMIN_PRODUCER_PASS: ${RABBITMQ_ADMIN_PRODUCER_PASS:-adminproducer123}
      RABBITMQ_AGENT_CONSUMER_USER: ${RABBITMQ_AGENT_CONSUMER_USER:-agent-consumer}
      RABBITMQ_AGENT_CONSUMER_PASS: ${RABBITMQ_AGENT_CONSUMER_PASS:-agentconsumer123}
      AGENT_API_TOKEN: ${AGENT_API_TOKEN}
      REACT_APP_URL: ${REACT_APP_URL}
      REDIS_HOST: netnotify-dragonfly
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: ${REDIS_PORT}

      
  netnotify-rabbitmq:
    build:
      context: .
      dockerfile: Dockerfile.rabbitmq
    container_name: netnotify-rabbitmq    
    ports:
      - "5673:5672"   # Porta padrão do RabbitMQ para clientes
      - "${RABBITMQ_MANAGEMENT_PORT}:15672" # Porta para o painel de administração do RabbitMQ
    environment:
      # Credenciais padrão do RabbitMQ (reconhecidas nativamente)
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
      # Variáveis para script de inicialização (rabbitmq-init.sh) criar usuários segregados
      RABBITMQ_ADMIN_PRODUCER_USER: ${RABBITMQ_ADMIN_PRODUCER_USER:-admin-producer}
      RABBITMQ_ADMIN_PRODUCER_PASS: ${RABBITMQ_ADMIN_PRODUCER_PASS:-adminproducer123}
      RABBITMQ_AGENT_CONSUMER_USER: ${RABBITMQ_AGENT_CONSUMER_USER:-agent-consumer}
      RABBITMQ_AGENT_CONSUMER_PASS: ${RABBITMQ_AGENT_CONSUMER_PASS:-agentconsumer123}
    healthcheck:
      test: ["CMD", "/usr/local/bin/rabbitmq-healthcheck.sh"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 130s
  netnotify-postgres:
    image: postgres:17
    container_name: netnotify-postgres
    volumes:
      - netnotify-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  netnotify-dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: netnotify-dragonfly
    ports:
      - "6379:6379"
    command: [ "--requirepass", "${REDIS_PASSWORD}" ]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
      

  netnotify-flyway:
    image: flyway/flyway:latest
    container_name: netnotify-flyway
    depends_on:
      - netnotify-postgres
    command: -url=jdbc:postgresql://netnotify-postgres:5432/${POSTGRES_DB} -user=${POSTGRES_USER} -password=${POSTGRES_PASSWORD} migrate
    volumes:
      - ./migrations:/flyway/sql

volumes:
  netnotify-postgres-data:
  
